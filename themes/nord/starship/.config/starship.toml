command_timeout = 5000
# Disable the blank line at the start of the prompt
# add_newline = false
# [character]
# success_symbol = '[‚ĚĮ](bold blue)'
# error_symbol = '[‚úó](bold red)'

[character]
disabled = false
success_symbol = '[Ôź≤](bold blue)'
error_symbol = '[Ôź≤](bold red)'
vimcmd_symbol = '[Ôźī](bold blue)'
vimcmd_replace_one_symbol = '[Ôźī](bold blue)'
vimcmd_replace_symbol = '[Ôźī](bold blue)'
vimcmd_visual_symbol = '[Ôźī](bold blue)'

# You can also replace your username with a neat symbol like ÔĄ† to save some space
[username]
show_always = true
style_user = "bg:#4c566a"
style_root = "bg:#4c566a"
format = '[ $user ]($style)'
detect_env_vars = ['!TMUX']

[directory]
style = "bg:#434C5E"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "Ó™É "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "
#"GitHub" = "Óúā "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ÔúėÔĄ™ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important Ôúė " = " ÔúėÔĄ™ "

