format = """
[оӮ¶](#4c566a)\
$os\
$username\
[оӮ°](bg:#434C5E fg:#4c566a)\
$directory\
[оӮ°](fg:#434C5E bg:#4C566A)\
$git_branch\
$git_status\
[оӮ°](fg:#4C566A bg:#88c0d0)\
$c\
$rust\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[оӮ°](fg:#88c0d0 bg:#5e81ac)\
$nix_shell\
[оӮ°](fg:#5e81ac bg:#88c0d0)\
$time\
[оӮҙ ](fg:#88c0d0)\
$line_break$character"""

command_timeout = 5000
# Disable the blank line at the start of the prompt
# add_newline = false
# [character]
# success_symbol = '[вқҜ](bold blue)'
# error_symbol = '[вң—](bold red)'

[character]
disabled = false
success_symbol = '[пҗІ](bold blue)'
error_symbol = '[пҗІ](bold red)'
vimcmd_symbol = '[пҗҙ](bold blue)'
vimcmd_replace_one_symbol = '[пҗҙ](bold blue)'
vimcmd_replace_symbol = '[пҗҙ](bold blue)'
vimcmd_visual_symbol = '[пҗҙ](bold blue)'

# You can also replace your username with a neat symbol like п„  to save some space
[username]
show_always = true
style_user = "bg:#4c566a"
style_root = "bg:#4c566a"
format = '[ $user ]($style)'
detect_env_vars = ['!TMUX']

[directory]
style = "bg:#434C5E"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "оӘғ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
#"GitHub" = "оңӮ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " пңҳп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пңҳ " = " пңҳп„Ә "

[c]
symbol = "оҳһ "
style = "bg:#86BBD8 fg:#434C5E"
format = '[ $symbol ($version) ]($style)'

[elixir]
symbol = "оүө "
style = "bg:#86BBD8 fg:#434C5E"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "оҳ¬ "
style = "bg:#86BBD8 fg:#434C5E"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "пҗҳ"
style = "bg:#4C566A"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#4C566A"
format = '[$all_status$ahead_behind ]($style)'

[haskell]
symbol = "оқ· "
style = "bg:#86BBD8 fg:#434C5E"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "оү– "
style = "bg:#86BBD8 fg:#434C5E"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "оҳӨ "
style = "bg:#86BBD8 fg:#434C5E"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#86BBD8 fg:#434C5E"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "пҡӨ "
style = "bg:#86BBD8 fg:#434C5E"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = "оҳҶ"
style = "bg:#86BBD8 fg:#434C5E"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#86BBD8 fg:#434C5E"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "fg:#434C5E bg:#88c0d0"
format = '[ $time ]($style)'

[os]
disabled = false
style = "bg:#4c566a"

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "оҳҹ"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"

[nix_shell]
disabled = false
symbol = "уұ„…"
heuristic = true
format = "[ $symbol ]($style)"
style = "bg:#5e81ac fg:#eceff4"
